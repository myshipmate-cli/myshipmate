name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'cli/**'
  pull_request:
    branches: [main]
    paths:
      - 'cli/**'

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cli
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt
        run: |
          go fmt ./...
          git diff --exit-code || (echo "Code not formatted. Run 'go fmt ./...'" && exit 1)

      - name: Run tests
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Build
        run: go build -v .

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cli/coverage.out
